<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780">
  <defs>
    <style>
      .title{font:700 34px Arial, Helvetica, sans-serif; fill:#111}
      .h{font:700 22px Arial, Helvetica, sans-serif; fill:#111}
      .t{font:16px Arial, Helvetica, sans-serif; fill:#222}
      .muted{fill:#666}
      .box{fill:#fff; stroke:#cfcfcf; stroke-width:2; rx:16; ry:16}
      .accent{fill:#f6fbff; stroke:#2b6cb0}
      .module{fill:#ffffff; stroke:#9fbfe6; stroke-width:2; rx:14; ry:14}
      .arrow{stroke:#666; stroke-width:3; marker-end:url(#m)}
      .chip{fill:#f7fafc; stroke:#cbd5e0; stroke-width:2; rx:12; ry:12}
      .chipText{font:700 15px Arial, Helvetica, sans-serif; fill:#111}
    </style>
    <marker id="m" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="780" fill="#ffffff"/>
  <text x="60" y="70" class="title">TRUEGUARD system overview</text>
  <text x="60" y="110" class="t muted">Single-pass multi-signal detection ’ explanation ’ mitigation</text>

  <!-- Input / LLM -->
  <rect x="70" y="190" width="300" height="120" class="box"/>
  <text x="220" y="235" text-anchor="middle" class="h">Prompt + Context</text>
  <text x="220" y="270" text-anchor="middle" class="t muted">user query, documents</text>

  <rect x="70" y="360" width="300" height="180" class="box"/>
  <text x="220" y="410" text-anchor="middle" class="h">LLM forward pass</text>
  <text x="220" y="445" text-anchor="middle" class="t muted">hidden states, attention, logits</text>
  <text x="220" y="485" text-anchor="middle" class="t muted">no extra sampling</text>

  <!-- Guard layer -->
  <rect x="450" y="240" width="880" height="360" class="box accent"/>
  <text x="490" y="285" class="h">TRUEGUARD (inline guard layer)</text>

  <!-- Modules -->
  <rect x="510" y="320" width="340" height="120" class="module"/>
  <text x="680" y="355" text-anchor="middle" class="h">1) Multi-signal detector</text>
  <text x="535" y="390" class="t">- internal state probes</text>
  <text x="535" y="415" class="t">- attention anomaly score</text>
  <text x="535" y="440" class="t">- entropy/energy monitor</text>

  <rect x="910" y="320" width="360" height="120" class="module"/>
  <text x="1090" y="355" text-anchor="middle" class="h">2) Fusion + risk score</text>
  <text x="935" y="390" class="t">learned weighting across signals</text>
  <text x="935" y="415" class="t">token risk R(t), sequence risk Rseq</text>

  <rect x="510" y="470" width="340" height="100" class="module"/>
  <text x="680" y="505" text-anchor="middle" class="h">3) Explainability</text>
  <text x="535" y="540" class="t">token trust highlights + attributions</text>

  <rect x="910" y="470" width="360" height="100" class="module"/>
  <text x="1090" y="505" text-anchor="middle" class="h">4) Mitigation</text>
  <text x="935" y="540" class="t">RAG grounding ’ calibrated abstention</text>

  <!-- Arrows -->
  <line x1="370" y1="250" x2="450" y2="250" class="arrow"/>
  <line x1="370" y1="450" x2="450" y2="450" class="arrow"/>

  <line x1="850" y1="380" x2="910" y2="380" class="arrow"/>
  <line x1="1090" y1="440" x2="1090" y2="470" class="arrow"/>
  <line x1="680" y1="440" x2="680" y2="470" class="arrow"/>

  <!-- Output -->
  <rect x="450" y="640" width="880" height="90" class="box"/>
  <text x="890" y="685" text-anchor="middle" class="h">Final response</text>
  <text x="890" y="712" text-anchor="middle" class="t muted">answer + trust indicators (and mitigation if triggered)</text>

  <line x1="1090" y1="570" x2="1090" y2="640" class="arrow"/>

  <!-- Chips legend -->
  <rect x="70" y="620" width="300" height="110" class="box"/>
  <text x="90" y="652" class="h">Signals extracted</text>
  <rect x="90" y="670" width="125" height="38" class="chip"/><text x="152" y="694" text-anchor="middle" class="chipText">hiddens</text>
  <rect x="225" y="670" width="125" height="38" class="chip"/><text x="287" y="694" text-anchor="middle" class="chipText">attention</text>
  <rect x="90" y="715" width="125" height="38" class="chip"/><text x="152" y="739" text-anchor="middle" class="chipText">logits</text>
  <rect x="225" y="715" width="125" height="38" class="chip"/><text x="287" y="739" text-anchor="middle" class="chipText">shifts</text>
</svg>
