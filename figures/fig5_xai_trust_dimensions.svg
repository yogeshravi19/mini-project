<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <style>
      .title{font:700 34px Arial, Helvetica, sans-serif; fill:#111}
      .h{font:700 20px Arial, Helvetica, sans-serif; fill:#111}
      .t{font:16px Arial, Helvetica, sans-serif; fill:#222}
      .muted{fill:#666}
      .box{fill:#fff; stroke:#cfcfcf; stroke-width:2; rx:16; ry:16}
      .quad{fill:#f7fafc; stroke:#cbd5e0; stroke-width:2; rx:16; ry:16}
      .arrow{stroke:#666; stroke-width:3; marker-end:url(#m)}
      .purple{stroke:#6b46c1}
    </style>
    <marker id="m" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="720" fill="#ffffff"/>
  <text x="60" y="70" class="title">Explainability dimensions and trust alignment</text>
  <text x="60" y="110" class="t muted">Human-centered explanations grounded in detection signals</text>

  <!-- Center -->
  <rect x="420" y="290" width="360" height="120" class="box"/>
  <text x="600" y="330" text-anchor="middle" class="h">TRUEGUARD explanations</text>
  <text x="600" y="365" text-anchor="middle" class="t muted">token highlights + attributions</text>

  <!-- Quadrants -->
  <rect x="90" y="180" width="360" height="170" class="quad"/>
  <text x="110" y="220" class="h">Faithfulness</text>
  <text x="110" y="250" class="t">reflects model evidence</text>
  <text x="110" y="275" class="t muted">signals: hiddens, attention, logits</text>

  <rect x="750" y="180" width="360" height="170" class="quad"/>
  <text x="770" y="220" class="h">Truthfulness</text>
  <text x="770" y="250" class="t">supports factual reliability</text>
  <text x="770" y="275" class="t muted">mitigation: retrieval grounding</text>

  <rect x="90" y="430" width="360" height="170" class="quad"/>
  <text x="110" y="470" class="h">Plausibility</text>
  <text x="110" y="500" class="t">understandable to users</text>
  <text x="110" y="525" class="t muted">clear captions, minimal jargon</text>

  <rect x="750" y="430" width="360" height="170" class="quad"/>
  <text x="770" y="470" class="h">Contrastivity</text>
  <text x="770" y="500" class="t">why this vs alternatives</text>
  <text x="770" y="525" class="t muted">top alternatives, ignored context</text>

  <!-- Arrows -->
  <line x1="450" y1="260" x2="520" y2="290" class="arrow"/>
  <line x1="750" y1="260" x2="680" y2="290" class="arrow"/>
  <line x1="450" y1="515" x2="520" y2="410" class="arrow"/>
  <line x1="750" y1="515" x2="680" y2="410" class="arrow"/>

  <!-- Trust note -->
  <rect x="90" y="630" width="1020" height="60" class="box" style="stroke:#6b46c1"/>
  <text x="600" y="667" text-anchor="middle" class="t">
    Goal: align model confidence indicators with observed human trust (presentation context matters)
  </text>
</svg>
