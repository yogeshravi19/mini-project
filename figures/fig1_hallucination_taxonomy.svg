<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650">
  <defs>
    <style>
      .title{font:700 34px Arial, Helvetica, sans-serif; fill:#111}
      .h{font:700 22px Arial, Helvetica, sans-serif; fill:#111}
      .t{font:16px Arial, Helvetica, sans-serif; fill:#222}
      .muted{fill:#666}
      .box{fill:#fff; stroke:#cfcfcf; stroke-width:2; rx:16; ry:16}
      .line{stroke:#bdbdbd; stroke-width:3}
      .intr{stroke:#2b6cb0}
      .extr{stroke:#c05621}
      .intrFill{fill:#ebf3ff}
      .extrFill{fill:#fff2e8}
      .pillText{font:700 16px Arial, Helvetica, sans-serif; fill:#111}
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="650" fill="#ffffff"/>
  <text x="60" y="70" class="title">Hallucination taxonomy (LLMs)</text>
  <text x="60" y="110" class="t muted">Two common types used in evaluation and detection literature</text>

  <!-- Root -->
  <rect x="420" y="150" width="360" height="80" class="box"/>
  <text x="600" y="200" text-anchor="middle" class="h">Hallucination</text>

  <!-- Branch lines -->
  <line x1="600" y1="230" x2="600" y2="275" class="line"/>
  <line x1="600" y1="275" x2="300" y2="275" class="line intr"/>
  <line x1="600" y1="275" x2="900" y2="275" class="line extr"/>
  <line x1="300" y1="275" x2="300" y2="310" class="line intr"/>
  <line x1="900" y1="275" x2="900" y2="310" class="line extr"/>

  <!-- Intrinsic -->
  <rect x="140" y="310" width="320" height="210" class="box intrFill" style="stroke:#2b6cb0"/>
  <text x="300" y="350" text-anchor="middle" class="h">Intrinsic</text>
  <text x="180" y="390" class="t">" contradicts provided context</text>
  <text x="180" y="420" class="t">" inconsistent with the source</text>
  <text x="180" y="450" class="t">" common in summarization / grounded tasks</text>
  <text x="180" y="490" class="t muted">Detection often benefits from attention-to-input signals</text>

  <!-- Extrinsic -->
  <rect x="740" y="310" width="320" height="210" class="box extrFill" style="stroke:#c05621"/>
  <text x="900" y="350" text-anchor="middle" class="h">Extrinsic</text>
  <text x="780" y="390" class="t">" fabricated facts not in the source</text>
  <text x="780" y="420" class="t">" unsupported claims / citations</text>
  <text x="780" y="450" class="t">" common in open-domain QA</text>
  <text x="780" y="490" class="t muted">Detection often benefits from entropy/energy uncertainty</text>

  <!-- Simple icons row -->
  <rect x="120" y="560" width="260" height="60" class="box"/>
  <text x="250" y="598" text-anchor="middle" class="pillText">Input context</text>

  <rect x="470" y="560" width="260" height="60" class="box"/>
  <text x="600" y="598" text-anchor="middle" class="pillText">LLM</text>

  <rect x="820" y="560" width="260" height="60" class="box"/>
  <text x="950" y="598" text-anchor="middle" class="pillText">Output</text>
</svg>
